name: Build & Deploy Vite App to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Clean Vite cache
        run: rm -rf node_modules/.vite

      - name: Create frontend .env for build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: |
          echo "Preparing .env for Vite build"
          > .env
          if [ -n "$VITE_GOOGLE_CLIENT_ID" ]; then echo "VITE_GOOGLE_CLIENT_ID=$VITE_GOOGLE_CLIENT_ID" >> .env; fi
          if [ -n "$VITE_API_BASE_URL" ]; then echo "VITE_API_BASE_URL=$VITE_API_BASE_URL" >> .env; fi
          if [ -n "$VITE_GEMINI_API_KEY" ]; then echo "VITE_GEMINI_API_KEY=$VITE_GEMINI_API_KEY" >> .env; fi

      - name: Build Vite app
        run: npm run build

      - name: Stage Backend Files to dist
        run: |
          mkdir -p dist
          if [ -d api ]; then cp -r api dist/; fi
          if [ -f sync_db.php ]; then cp sync_db.php dist/; fi

      - name: Debug Connection (Network Check)
        run: |
          echo "Testing connection to ${{ secrets.FTP_SERVER }}..."
          nc -zv -w 5 ${{ secrets.FTP_SERVER }} 21 || echo "Port 21 (FTP) is BLOCKED"
          nc -zv -w 5 ${{ secrets.FTP_SERVER }} 22 || echo "Port 22 (SFTP) is BLOCKED"
          nc -zv -w 5 ${{ secrets.FTP_SERVER }} 65002 || echo "Port 65002 (Hostinger Custom SSH) is BLOCKED"

      - name: Deploy dist to Hostinger (Standard FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          protocol: ftp
          port: 21
          exclude: |
            **/.git*
            **/.git*/**
            .env